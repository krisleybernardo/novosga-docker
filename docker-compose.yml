name: novosga

services:

  postgres:
    image: postgres:18.4-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:?}
      POSTGRES_USER:     ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      PGDATA:            /var/lib/postgresql/18/docker
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:?} -U ${POSTGRES_USER:?}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mercure:
    image: novosga/mercure:v0.11
    restart: unless-stopped
    environment:
      SERVER_NAME:                ":3000"
      MERCURE_PUBLISHER_JWT_KEY:  ${MERCURE_JWT_SECRET:?}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:?}
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous 1
        cors_origins *
    ports:
      - "13000:3000"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  novosga:
    image: novosga/novosga:2.2-standalone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mercure:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      APP_ENV:                 prod
      DATABASE_URL:            "postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}?serverVersion=18&charset=utf8"
      MERCURE_URL:             ${MERCURE_URL:?}
      MERCURE_PUBLIC_URL:      ${MERCURE_PUBLIC_URL:?}
      MERCURE_JWT_SECRET:      ${MERCURE_JWT_SECRET:?}
      TZ:                      ${TZ:?}
      LANGUAGE:                ${LANGUAGE:?}
      NOVOSGA_ADMIN_USERNAME:  ${NOVOSGA_ADMIN_USERNAME:?}
      NOVOSGA_ADMIN_PASSWORD:  ${NOVOSGA_ADMIN_PASSWORD:?}
      NOVOSGA_ADMIN_FIRSTNAME: ${NOVOSGA_ADMIN_FIRSTNAME:?}
      NOVOSGA_ADMIN_LASTNAME:  ${NOVOSGA_ADMIN_LASTNAME:?}
    volumes:
      - novosga_uploads:/var/www/html/public/uploads
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  painel:
    image: novosga/panel-app:v2.1.1
    restart: unless-stopped
    depends_on:
      novosga:
        condition: service_healthy
    ports:
      - "18081:80"
    deploy:
      resources:
        limits:
          memory: 86m
          cpus: "0.25"

  triagem:
    image: novosga/triage-app:v2.1.0
    restart: unless-stopped
    depends_on:
      novosga:
        condition: service_healthy
    ports:
      - "18082:80"
    deploy:
      resources:
        limits:
          memory: 86m
          cpus: "0.25"

volumes:
  db_data:
  novosga_uploads:
